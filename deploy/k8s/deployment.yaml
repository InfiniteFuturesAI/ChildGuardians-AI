# =============================================================================
# CHILD GUARDIANS - Kubernetes Deployment
# =============================================================================
# Production-grade Kubernetes manifests
# Deploy with: kubectl apply -f deploy/k8s/
# =============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: child-guardians
  labels:
    app: child-guardians
    environment: production

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: child-guardians-config
  namespace: child-guardians
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  REQUIRE_TLS: "true"
  AUDIT_ENABLED: "true"
  AUDIT_RETENTION_DAYS: "2555"

---
apiVersion: v1
kind: Secret
metadata:
  name: child-guardians-secrets
  namespace: child-guardians
type: Opaque
stringData:
  SECRET_KEY: "REPLACE_WITH_ACTUAL_SECRET"  # Generate with: python -c "import secrets; print(secrets.token_hex(32))"
  DATABASE_URL: "postgresql://user:password@host:5432/child_guardians"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: child-guardians-api
  namespace: child-guardians
  labels:
    app: child-guardians
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: child-guardians
      component: api
  template:
    metadata:
      labels:
        app: child-guardians
        component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      containers:
        - name: api
          image: ghcr.io/child-guardians/child-guardians:latest
          imagePullPolicy: Always
          
          ports:
            - containerPort: 8000
              name: http
          
          envFrom:
            - configMapRef:
                name: child-guardians-config
            - secretRef:
                name: child-guardians-secrets
          
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
      
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: child-guardians-data
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: child-guardians-api
  namespace: child-guardians
spec:
  selector:
    app: child-guardians
    component: api
  ports:
    - port: 80
      targetPort: 8000
      name: http
  type: ClusterIP

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: child-guardians-data
  namespace: child-guardians
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard  # Adjust for your cluster

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: child-guardians-network-policy
  namespace: child-guardians
spec:
  podSelector:
    matchLabels:
      app: child-guardians
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - port: 8000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - port: 5432  # PostgreSQL
        - port: 443   # HTTPS for external APIs

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: child-guardians-pdb
  namespace: child-guardians
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: child-guardians
      component: api

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: child-guardians-hpa
  namespace: child-guardians
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: child-guardians-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
